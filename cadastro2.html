<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>CicloCare | Cadastro</title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="./css/login.css"
  >

</head>

<body>

  <div class="flower flower1">
    <img src="./assets/images/icone.png">
  </div>

  <div class="flower flower2">
    <img src="./assets/images/icone.png">
  </div>

  <div class="flower flower3">
    <img src="./assets/images/icone.png">
  </div>

  <div class="flower flower4">
    <img src="./assets/images/icone.png">
  </div>

  <div class="flower flower5">
    <img src="./assets/images/icone.png">
  </div>

  <div class="flower flower6">
    <img src="./assets/images/icone.png">
  </div>

  <main class="container">

    <section class="left">

      <div class="logo">

        <img
          src="./assets/images/icone.png"
          alt="Logo CicloCare"
        >

        <span>CicloCare</span>

      </div>

      <h1 class="welcome">
        Que bom ter<br>
        você aqui!
      </h1>

      <p class="subtitle">

        Sua jornada de
        autoconhecimento
        começa agora.
        Vamos cuidar do
        seu ciclo, juntas?

      </p>

      <div class="forgot">

            <p>
                <a class="forgot" href="login.html">
                 Já tem uma conta? Entrar
                </a>
            </p>

            </div>

    </section>

    <section class="right">

      <div class="login-box">

        <form id="formCiclo">

          <h2 class="config-title">
            Configuração do Ciclo
          </h2>

          <div class="form-group">

            <label>
              Data de Nascimento
            </label>

            <input
              type="date"
              class="form-control"
              id="nascimento"
            >

          </div>

          <div class="form-group">

            <label>
              Qual é a média da duração do seu ciclo?
            </label>

            <input
              type="number"
              class="form-control"
              placeholder="Ex: 28 dias"
              id="duracaoCiclo"
            >

          </div>

          <div class="form-group">

            <label>
              Qual é o tempo médio da sua menstruação?
            </label>

            <input
              type="number"
              class="form-control"
              placeholder="Ex: 5 dias"
              id="duracaoMenstruacao"
            >

          </div>

          <div class="form-group">

            <label>
              Quando foi sua última menstruação?
            </label>

            <input
              type="date"
              class="form-control"
              id="ultimaMenstruacao"
            >

          </div>

          <button
            class="login-btn"
            type="submit"
          >
            Próximo
          </button>

        </form>

      </div>

    </section>

  </main>

  <script src="./js/cadastro2.js"></script>

</body>
</html>
