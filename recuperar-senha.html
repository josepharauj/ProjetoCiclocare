<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CicloCare | Recuperar Senha</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./css/recuperar-senha.css">
</head>
<body>

  <div class="flower flower1"><img src="./assets/images/icone.png"></div>
  <div class="flower flower2"><img src="./assets/images/icone.png"></div>
  <div class="flower flower3"><img src="./assets/images/icone.png"></div>
  <div class="flower flower4"><img src="./assets/images/icone.png"></div>
  <div class="flower flower5"><img src="./assets/images/icone.png"></div>
  <div class="flower flower6"><img src="./assets/images/icone.png"></div>

  <main class="container">
    <section class="left">
      <div class="logo">
        <img src="./assets/images/icone.png" alt="Logo CicloCare">
        <span>CicloCare</span>
      </div>

      <h1 class="welcome">
        Esqueceu a<br>
        sua senha?
      </h1>
      
      <h1 class="welcome1">
        Não se preocupe! Digite seu email e enviaremos as instruções para você recuperar o acesso.
      </h1>

      <a href="login.html" class="register">
        Lembrou a senha?<br>
        Voltar ao Login
      </a>
    </section>

    <section class="right">
      <div class="login-box">
        <h2 class="box-title" style="margin-bottom: 25px; font-size: 2rem; font-weight: 700; color: #000;">
          Recuperação
        </h2>

        <form id="recoverForm">
          <div class="form-group">
            <label>Email cadastrado</label>
            <input
              type="email"
              class="form-control"
              placeholder="Digite seu email"
              id="email"
              required
            >
          </div>

          <button
                  class="login-btn"
                  type="submit"
                  id="recoverButton"
          >
              Enviar link de recuperação
          </button>
        </form>
      </div>
    </section>
  </main>

  <script src="./js/recuperar-senha.js"></script>
</body>
</html>
